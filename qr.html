<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Check</title>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body class="min-h-screen flex items-center justify-center p-4 sm:p-6">

<!-- 🍔 BURGER BUTTON -->
<button id="menuBtn" class="fixed top-4 left-4 z-[1001] bg-red-600 text-white p-2 rounded-lg shadow-lg hover:bg-red-700 transition">
  <i data-lucide="menu"></i>
</button>

<!-- 🌑 OVERLAY -->
<div id="overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm opacity-0 pointer-events-none transition duration-300 z-[999]"></div>

<!-- 📂 SIDE MENU -->
<div id="sideMenu" class="fixed top-0 left-0 h-full w-64 shadow-2xl transform -translate-x-full transition duration-300 z-[1000] p-5 border-r">

  <div class="flex items-center gap-2 mb-8">
    <i data-lucide="car" class="text-red-500"></i>
    <h2 class="text-xl font-bold text-white">Moventra</h2>
  </div>

  <nav class="space-y-2">

    <a href="index.html"
       class="flex items-center gap-3 p-3 rounded-lg hover:bg-red-500/10 hover:text-red-400 transition">
      <i data-lucide="user"></i>
      <span>Register Vehicle</span>
    </a>

    <!-- ACTIVE -->
    <a href="qr.html"
       class="flex items-center gap-3 p-3 rounded-lg bg-red-500/20 text-red-400 font-medium">
      <i data-lucide="qr-code"></i>
      <span>QR Code Check</span>
    </a>

  </nav>

</div>

<!-- CONTENT -->
<div class="card shadow-2xl rounded-2xl p-7 max-w-xl w-full mx-auto">

  <h2 class="text-xl font-bold mb-4 text-center">
    QR Code Lookup
  </h2>

  <input id="searchId" type="text" placeholder="Enter Staff / Student ID"
    class="w-full rounded-lg p-2 mb-3">

  <button onclick="searchUser()"
    class="w-full bg-red-600 text-white py-2 rounded-lg mb-4 hover:bg-red-700 transition">
    Search
  </button>

  <!-- RESULT -->
  <div id="resultBox" class="hidden mt-6">

    <div class="glass-inner rounded-xl p-5 fade-in text-center">

      <h3 class="text-lg font-semibold mb-3">
        🎫 Digital Parking Pass
      </h3>

      <div class="mb-4">
        <p id="resultName" class="font-bold text-lg"></p>
        <p id="resultPlate" class="text-sm opacity-70"></p>
      </div>

      <div class="flex justify-center mb-4">
        <canvas id="resultQR" class="p-2 rounded-lg shadow-inner"></canvas>
      </div>

      <p class="text-xs opacity-50">
        Show this QR at the entrance
      </p>

    </div>

  </div>

</div>

<!-- ✅ FIX: USE EXTERNAL JS ONLY (no duplicate logic) -->
<script type="module" src="qr.js"></script>

<!-- ICONS -->
<script>
  lucide.createIcons();
</script>

</body>
</html>
